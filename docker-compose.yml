services:
  svitlolocator:
    build:
      context: .
      dockerfile: Dockerfile
    image: svitlolocator:latest
    container_name: svitlolocator
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - traefik-public
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      
      - "traefik.http.routers.svitlolocator.rule=Host(`svitlo-finder.xyz`) || Host(`www.svitlo-finder.xyz`)"
      - "traefik.http.routers.svitlolocator.entrypoints=websecure"
      - "traefik.http.routers.svitlolocator.tls=true"
      - "traefik.http.routers.svitlolocator.tls.certresolver=myresolver"

      - "traefik.http.services.svitlolocator.loadbalancer.server.port=8082"

  redis:
    image: redis:alpine
    container_name: svitlolocator_redis
    restart: unless-stopped
    networks:
      - internal-net

networks:
  traefik-public:
    external: true
  internal-net: