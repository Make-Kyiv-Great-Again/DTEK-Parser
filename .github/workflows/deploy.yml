name: Deploy Frontend to VPC

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Deploy to VPC
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            cd /opt

            if [ ! -d "DTEK-Parser-" ]; then
              echo "Cloning repository..."
              git clone https://github.com/KovalovOL/DTEK-Parser-.git
              cd DTEK-Parser-
            else
              echo "Repository exists. Pulling latest changes..."
              cd DTEK-Parser-
              git pull origin main
            fi

            echo "Rebuilding and deploying containers..."
            docker compose up -d --build
            docker image prune -f