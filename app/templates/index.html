<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моніторинг Відключень Світла (Yasno/DTEK Wrapper)</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet.js Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --sidebar-bg: #111827;
            --input-bg: #1f2937;
            --border-color: #374151;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --power-on: #10b981;
            --power-off: #ef4444;
            --power-possible: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Simplified Sidebar Layout - Absolutely Positioned to Avoid Flex Recalculations */
        #sidebar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 380px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
            overflow-y: auto;
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 i {
            color: var(--primary);
        }

        header p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        select, input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            padding: 10px;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.15s;
        }

        select:focus, input:focus {
            border-color: var(--primary);
        }

        /* Autocomplete results dropdown */
        .autocomplete-container {
            position: relative;
        }

        .autocomplete-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            max-height: 180px;
            overflow-y: auto;
            z-index: 1100;
            margin-top: 4px;
            display: none;
        }

        .autocomplete-item {
            padding: 8px 10px;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-color);
        }

        .autocomplete-item:hover {
            background: rgba(245, 158, 11, 0.1);
            color: var(--primary);
        }

        /* Simplified Status Panel */
        .status-panel {
            background: #1f2937;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: none;
            position: relative;
        }

        .status-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 8px;
        }

        .status-badge {
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .status-badge.on {
            background: rgba(16, 185, 129, 0.1);
            color: var(--power-on);
            border: 1px solid var(--power-on);
        }

        .status-badge.off {
            background: rgba(239, 68, 68, 0.1);
            color: var(--power-off);
            border: 1px solid var(--power-off);
        }

        .status-badge.possible {
            background: rgba(245, 158, 11, 0.1);
            color: var(--power-possible);
            border: 1px solid var(--power-possible);
        }

        .address-title {
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.3;
        }

        .group-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .reason-text {
            font-size: 0.8rem;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        /* Simplified Grid */
        .schedule-title {
            font-weight: 600;
            font-size: 0.8rem;
            margin-top: 12px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-muted);
        }

        .grid-legend {
            display: flex;
            gap: 6px;
            font-size: 0.65rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .legend-color {
            width: 6px;
            height: 6px;
            border-radius: 1px;
        }

        .legend-on { background: var(--power-on); }
        .legend-off { background: var(--power-off); }
        .legend-possible { background: var(--power-possible); }

        .weekly-grid-container {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #111827;
            padding: 6px;
        }

        .day-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            font-size: 0.7rem;
        }

        .day-name {
            width: 24px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .hours-bar {
            flex-grow: 1;
            height: 12px;
            display: flex;
            border-radius: 2px;
            overflow: hidden;
            background: #374151;
        }

        .hour-cell {
            flex: 1;
            height: 100%;
            border-right: 1px solid rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .hour-cell:last-child {
            border-right: none;
        }

        .hour-cell.on { background: var(--power-on); }
        .hour-cell.off { background: var(--power-off); }
        .hour-cell.possible { background: var(--power-possible); }

        .hour-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: #fff;
            padding: 3px 5px;
            border-radius: 3px;
            font-size: 9px;
            white-space: nowrap;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 2000;
            pointer-events: none;
            border: 1px solid var(--border-color);
        }

        .hour-cell:hover .hour-tooltip {
            visibility: visible;
            opacity: 1;
        }

        .planned-section {
            margin-top: 12px;
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 6px;
            padding: 10px;
            font-size: 0.75rem;
        }

        .planned-section h4 {
            color: var(--primary);
            font-size: 0.8rem;
            margin-bottom: 4px;
            font-weight: 600;
        }

        /* Map styling - Absolutely Positioned to Fill the Rest of the Screen */
        #map-container {
            position: absolute;
            left: 380px;
            right: 0;
            top: 0;
            bottom: 0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Loader */
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(17, 24, 39, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            border-radius: 8px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .map-tip-btn {
            background: var(--primary);
            color: #111827;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
        }

        .map-tip-btn:hover {
            background: var(--primary-hover);
        }

        /* Custom Popup styling */
        .leaflet-popup-content-wrapper {
            background: var(--sidebar-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
        }

        .leaflet-popup-tip {
            background: var(--sidebar-bg);
        }
    </style>
</head>
<body>

    <!-- SIDEBAR FOR CONTROLS & STATUS -->
    <div id="sidebar">
        <header>
            <h1><i class="fa-solid fa-bolt"></i> СвітлоЛокатор</h1>
            <p>Wrapper / Parser для графіків Yasno & DTEK</p>
        </header>

        <!-- Region & DSO Selectors -->
        <div class="control-group">
            <label for="region-select">Регіон</label>
            <select id="region-select"></select>
        </div>

        <div class="control-group">
            <label for="dso-select">Оператор мережі (DSO)</label>
            <select id="dso-select"></select>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 4px 0;">

        <!-- Manual Address Selector -->
        <div class="control-group">
            <label>Пошук за адресою</label>
            <div class="autocomplete-container">
                <input type="text" id="street-input" placeholder="Введіть назву вулиці..." autocomplete="off">
                <div id="street-results" class="autocomplete-results"></div>
            </div>
        </div>

        <div class="control-group">
            <label for="house-select">Будинок</label>
            <select id="house-select" disabled>
                <option value="">Спочатку виберіть вулицю...</option>
            </select>
        </div>

        <div style="font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: -2px;">
            <i class="fa-solid fa-circle-info"></i> Ви також можете клікнути на карті для швидкого пошуку
        </div>

        <!-- STATUS PANEL -->
        <div class="status-panel" id="status-panel">
            <div class="loader-overlay" id="status-loader">
                <div class="spinner"></div>
            </div>
            
            <div class="status-header">
                <div>
                    <div class="address-title" id="addr-val">-</div>
                    <div class="group-label" id="group-val">-</div>
                </div>
                <div class="status-badge" id="status-badge" style="display: none;">
                    <i class="fa-solid fa-circle"></i> <span id="status-text">ON</span>
                </div>
            </div>

            <div class="reason-text" id="reason-val">-</div>

            <!-- Planned Outages (Today / Tomorrow) -->
            <div class="planned-section" id="planned-outages-section" style="display: none;">
                <h4><i class="fa-solid fa-circle-exclamation"></i> Планові відключення:</h4>
                <div id="planned-outages-content">Немає запланованих вимкнень.</div>
            </div>

            <!-- Weekly Schedule Grid -->
            <div class="schedule-title">
                <span>Тижневий графік</span>
                <div class="grid-legend">
                    <div class="legend-item">
                        <div class="legend-color legend-on"></div> Є
                    </div>
                    <div class="legend-item">
                        <div class="legend-color legend-off"></div> Немає
                    </div>
                    <div class="legend-item">
                        <div class="legend-color legend-possible"></div> Можливо
                    </div>
                </div>
            </div>
            
            <div class="weekly-grid-container" id="weekly-grid">
                <!-- Day rows will be populated dynamically -->
            </div>
        </div>
    </div>

    <!-- MAP CONTAINER -->
    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // --- State Management ---
        let regionsData = [];
        let selectedRegionId = null;
        let selectedDsoId = null;
        let selectedStreetId = null;
        let map = null;
        let currentMarker = null;

        // Kyiv default coords
        const defaultCoords = { lat: 50.4501, lon: 30.5234, zoom: 12 };

        // Days of week mapping (Yasno API 0-6 index)
        const daysOfWeek = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];

        // --- Initialize App ---
        document.addEventListener('DOMContentLoaded', async () => {
            initMap();
            await fetchRegions();
            setupEventListeners();
        });

        // --- Leaflet Map Setup ---
        function initMap() {
            map = L.map('map', {
                zoomControl: true,
                attributionControl: false
            }).setView([defaultCoords.lat, defaultCoords.lon], defaultCoords.zoom);

            // Dark Map Tiles (CartoDB Dark Matter) - Simplified URL (removed `{r}`)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
                maxZoom: 20
            }).addTo(map);

            // Add Click Handler
            map.on('click', onMapClick);
        }

        // --- Event Listeners Setup ---
        function setupEventListeners() {
            // Region change
            document.getElementById('region-select').addEventListener('change', (e) => {
                selectedRegionId = parseInt(e.target.value);
                populateDsos();
                resetSearch();
            });

            // DSO change
            document.getElementById('dso-select').addEventListener('change', (e) => {
                selectedDsoId = parseInt(e.target.value);
                resetSearch();
            });

            // Street autocomplete search input
            const streetInput = document.getElementById('street-input');
            const streetResults = document.getElementById('street-results');

            let debounceTimer;
            streetInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                const query = e.target.value.trim();
                if (query.length < 3) {
                    streetResults.style.display = 'none';
                    return;
                }

                debounceTimer = setTimeout(() => {
                    performStreetSearch(query);
                }, 300);
            });

            // Hide autocomplete on click outside
            document.addEventListener('click', (e) => {
                if (!streetInput.contains(e.target) && !streetResults.contains(e.target)) {
                    streetResults.style.display = 'none';
                }
            });

            // House change
            document.getElementById('house-select').addEventListener('change', (e) => {
                const houseId = e.target.value;
                if (houseId) {
                    fetchBlackoutStatus(houseId);
                }
            });
        }

        // --- Fetch Regions & Populate UI ---
        async function fetchRegions() {
            try {
                const response = await fetch('/api/v1/regions');
                regionsData = await response.json();
                
                const regionSelect = document.getElementById('region-select');
                regionSelect.innerHTML = '';
                
                regionsData.forEach(region => {
                    const opt = document.createElement('option');
                    opt.value = region.id;
                    opt.textContent = region.value;
                    regionSelect.appendChild(opt);
                });

                // Default to Kyiv
                regionSelect.value = 25;
                selectedRegionId = 25;
                populateDsos();
            } catch (err) {
                console.error("Failed to load regions:", err);
            }
        }

        function populateDsos() {
            const region = regionsData.find(r => r.id === selectedRegionId);
            const dsoSelect = document.getElementById('dso-select');
            dsoSelect.innerHTML = '';

            if (region && region.dsos) {
                region.dsos.forEach(dso => {
                    const opt = document.createElement('option');
                    opt.value = dso.id;
                    opt.textContent = dso.name;
                    dsoSelect.appendChild(opt);
                });
                
                selectedDsoId = region.dsos[0].id;
                dsoSelect.value = selectedDsoId;
            }

            // Reposition map view based on region
            if (selectedRegionId === 3) { // Dnipro
                map.setView([48.4647, 35.0462], 12);
            } else { // Kyiv
                map.setView([50.4501, 30.5234], 12);
            }
        }

        // --- Street Autocomplete Search ---
        async function performStreetSearch(query) {
            try {
                const url = `/api/v1/streets?regionId=${selectedRegionId}&dsoId=${selectedDsoId}&query=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                const streets = await response.json();
                
                const resultsContainer = document.getElementById('street-results');
                resultsContainer.innerHTML = '';

                if (streets.length === 0) {
                    resultsContainer.innerHTML = '<div class="autocomplete-item" style="color: var(--text-muted); cursor: default;">Нічого не знайдено</div>';
                    resultsContainer.style.display = 'block';
                    return;
                }

                streets.forEach(street => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    div.textContent = street.value;
                    div.addEventListener('click', () => {
                        document.getElementById('street-input').value = street.value;
                        selectedStreetId = street.id;
                        resultsContainer.style.display = 'none';
                        loadHouses(street.id);
                    });
                    resultsContainer.appendChild(div);
                });

                resultsContainer.style.display = 'block';
            } catch (err) {
                console.error("Street search failed:", err);
            }
        }

        // --- Fetch & Load Houses ---
        async function loadHouses(streetId) {
            const houseSelect = document.getElementById('house-select');
            houseSelect.disabled = true;
            houseSelect.innerHTML = '<option value="">Завантаження будинків...</option>';

            try {
                const url = `/api/v1/houses?regionId=${selectedRegionId}&streetId=${streetId}&dsoId=${selectedDsoId}`;
                const response = await fetch(url);
                const houses = await response.json();

                houseSelect.innerHTML = '<option value="">Виберіть номер будинку...</option>';
                
                // Sort houses alphanumeric
                houses.sort((a, b) => a.value.localeCompare(b.value, undefined, { numeric: true, sensitivity: 'base' }));

                houses.forEach(house => {
                    const opt = document.createElement('option');
                    opt.value = house.id;
                    opt.textContent = house.value;
                    houseSelect.appendChild(opt);
                });

                houseSelect.disabled = false;
            } catch (err) {
                console.error("Failed to load houses:", err);
                houseSelect.innerHTML = '<option value="">Помилка завантаження будинків</option>';
            }
        }

        function resetSearch() {
            document.getElementById('street-input').value = '';
            selectedStreetId = null;
            
            const houseSelect = document.getElementById('house-select');
            houseSelect.innerHTML = '<option value="">Спочатку виберіть вулицю...</option>';
            houseSelect.disabled = true;

            document.getElementById('status-panel').style.display = 'none';
            if (currentMarker) {
                map.removeLayer(currentMarker);
                currentMarker = null;
            }
        }

        // --- Fetch & Render Blackout Status ---
        async function fetchBlackoutStatus(houseId, customAddressLabel = null) {
            const statusPanel = document.getElementById('status-panel');
            const loader = document.getElementById('status-loader');
            
            statusPanel.style.display = 'block';
            loader.style.display = 'flex';

            try {
                let streetName = "";
                let houseName = "";
                if (customAddressLabel) {
                    const parts = customAddressLabel.split(", ");
                    streetName = parts[0] ? parts[0].trim() : "";
                    houseName = parts[1] ? parts[1].trim() : "";
                } else {
                    streetName = document.getElementById('street-input').value.trim();
                    const houseSelect = document.getElementById('house-select');
                    if (houseSelect.selectedIndex >= 0) {
                        houseName = houseSelect.options[houseSelect.selectedIndex].text.trim();
                    }
                }
                let url = `/api/v1/status?regionId=${selectedRegionId}&streetId=${selectedStreetId}&houseId=${houseId}&dsoId=${selectedDsoId}`;
                if (streetName && houseName) {
                    url += `&streetName=${encodeURIComponent(streetName)}&houseName=${encodeURIComponent(houseName)}`;
                }
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error("Failed to get status from API");
                }

                const data = await response.json();
                renderStatus(data, customAddressLabel);
            } catch (err) {
                console.error(err);
                document.getElementById('addr-val').textContent = "Помилка завантаження";
                document.getElementById('group-val').textContent = "";
                document.getElementById('reason-val').textContent = "Не вдалося отримати дані від Yasno API. Спробуйте іншу адресу.";
                document.getElementById('status-badge').style.display = 'none';
                document.getElementById('planned-outages-section').style.display = 'none';
                document.getElementById('weekly-grid').innerHTML = '';
            } finally {
                loader.style.display = 'none';
            }
        }

        // --- Render UI elements based on API status response ---
        function renderStatus(data, customAddressLabel) {
            const addrVal = document.getElementById('addr-val');
            const groupVal = document.getElementById('group-val');
            const statusBadge = document.getElementById('status-badge');
            const statusText = document.getElementById('status-text');
            const reasonVal = document.getElementById('reason-val');

            // Set Address & Group Info
            addrVal.textContent = customAddressLabel || document.getElementById('street-input').value + ", " + document.getElementById('house-select').options[document.getElementById('house-select').selectedIndex].text;
            groupVal.textContent = `Група (черга): ${data.group_info.raw_group_key} (Графік ${data.group_info.mapped_group_key})`;

            // Configure Status Badge
            statusBadge.className = 'status-badge';
            statusBadge.style.display = 'flex';

            if (data.power_status === 'ON') {
                statusBadge.classList.add('on');
                statusText.textContent = 'СВІТЛО Є';
            } else if (data.power_status === 'OFF') {
                statusBadge.classList.add('off');
                statusText.textContent = 'НЕМАЄ СВІТЛА';
            } else {
                statusBadge.classList.add('possible');
                statusText.textContent = 'МОЖЛИВЕ ВИМКНЕННЯ';
            }

            reasonVal.textContent = data.status_reason;

            // Render Planned Outages & Weekly Grid conditionally
            const today = data.planned_schedule ? data.planned_schedule.today : null;
            const tomorrow = data.planned_schedule ? data.planned_schedule.tomorrow : null;

            const hasPlannedOutages = 
                (today && (today.status === 'ScheduleApplies' || today.status === 'EmergencyOutages' || (today.slots && today.slots.length > 0))) ||
                (tomorrow && (tomorrow.status === 'ScheduleApplies' || tomorrow.status === 'EmergencyOutages' || (tomorrow.slots && tomorrow.slots.length > 0)));

            const showSchedule = hasPlannedOutages || data.power_status === 'OFF' || data.power_status === 'EMERGENCY';

            const plannedSection = document.getElementById('planned-outages-section');
            const plannedContent = document.getElementById('planned-outages-content');
            const weeklyTitle = document.querySelector('.schedule-title');
            const weeklyGrid = document.getElementById('weekly-grid');

            if (showSchedule) {
                // 1. Render Planned Outages Box
                if (data.planned_schedule && (today || tomorrow)) {
                    let html = '';
                    if (today) {
                        const todayDate = new Date(today.date).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
                        html += `<div><strong>Сьогодні (${todayDate}):</strong> ${translateStatus(today.status)}</div>`;
                        if (today.slots && today.slots.length > 0) {
                            html += `<ul style="margin-left: 15px; margin-top: 4px;">`;
                            today.slots.forEach(slot => {
                                html += `<li>${formatMinutes(slot.start)} - ${formatMinutes(slot.end)} (${translateSlotType(slot.type)})</li>`;
                            });
                            html += `</ul>`;
                        }
                    }
                    if (tomorrow) {
                        const tomorrowDate = new Date(tomorrow.date).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
                        html += `<div style="margin-top: 8px;"><strong>Завтра (${tomorrowDate}):</strong> ${translateStatus(tomorrow.status)}</div>`;
                        if (tomorrow.slots && tomorrow.slots.length > 0) {
                            html += `<ul style="margin-left: 15px; margin-top: 4px;">`;
                            tomorrow.slots.forEach(slot => {
                                html += `<li>${formatMinutes(slot.start)} - ${formatMinutes(slot.end)} (${translateSlotType(slot.type)})</li>`;
                            });
                            html += `</ul>`;
                        }
                    }
                    plannedContent.innerHTML = html;
                    plannedSection.style.display = 'block';
                } else {
                    plannedSection.style.display = 'none';
                }

                // 2. Show and render Weekly Grid
                weeklyTitle.style.display = 'flex';
                weeklyGrid.style.display = 'block';
                renderWeeklySchedule(data.weekly_schedule);
            } else {
                // Hide planned outages, weekly title/legend, and grid entirely
                plannedSection.style.display = 'none';
                weeklyTitle.style.display = 'none';
                weeklyGrid.style.display = 'none';
                weeklyGrid.innerHTML = '';
            }
        }

        function translateStatus(status) {
            const map = {
                'NoOutages': 'Відключень не планується',
                'WaitingForSchedule': 'Очікується оновлення графіку від оператора',
                'ScheduleApplies': 'Застосовується стабілізаційний графік',
                'EmergencyOutages': 'Аварійні вимкнення'
            };
            return map[status] || status;
        }

        function translateSlotType(type) {
            const map = {
                'Definite': 'Гарантоване відключення',
                'Possible': 'Можливе відключення',
                'NotPlanned': 'Світло є'
            };
            return map[type] || type;
        }

        function formatMinutes(m) {
            const hrs = Math.floor(m / 60).toString().padStart(2, '0');
            const mins = (m % 60).toString().padStart(2, '0');
            return `${hrs}:${mins}`;
        }

        // --- Render weekly schedule grid ---
        function renderWeeklySchedule(schedule) {
            const container = document.getElementById('weekly-grid');
            container.innerHTML = '';

            if (!schedule) {
                container.innerHTML = '<div style="color: var(--text-muted); font-size: 0.8rem; text-align: center; padding: 20px;">Графік відсутній</div>';
                return;
            }

            // Grid header showing hours 0, 4, 8, 12, 16, 20
            const headerRow = document.createElement('div');
            headerRow.className = 'day-row';
            headerRow.style.marginBottom = '2px';
            
            const blank = document.createElement('div');
            blank.className = 'day-name';
            headerRow.appendChild(blank);

            const hoursBar = document.createElement('div');
            hoursBar.className = 'hours-bar';
            hoursBar.style.background = 'transparent';
            hoursBar.style.color = 'var(--text-muted)';
            hoursBar.style.fontSize = '8px';
            hoursBar.style.position = 'relative';

            for (let i = 0; i <= 24; i += 4) {
                const label = document.createElement('span');
                label.textContent = i.toString().padStart(2, '0');
                label.style.position = 'absolute';
                label.style.left = `${(i / 24) * 100}%`;
                label.style.transform = i === 24 ? 'translateX(-100%)' : 'translateX(-50%)';
                hoursBar.appendChild(label);
            }
            headerRow.appendChild(hoursBar);
            container.appendChild(headerRow);

            // Populate rows 0 to 6
            for (let day = 0; day < 7; day++) {
                const dayKey = day.toString();
                const daySlots = schedule[dayKey] || [];

                const row = document.createElement('div');
                row.className = 'day-row';

                const nameDiv = document.createElement('div');
                nameDiv.className = 'day-name';
                nameDiv.textContent = daysOfWeek[day];
                row.appendChild(nameDiv);

                const bar = document.createElement('div');
                bar.className = 'hours-bar';

                // Each hour cell represents 1 hour (60 minutes).
                for (let hour = 0; hour < 24; hour++) {
                    const startMin = hour * 60;
                    const endMin = (hour + 1) * 60;

                    let type = 'on'; // default to on
                    const matchingSlot = daySlots.find(s => s.start <= startMin && s.end >= endMin);
                    
                    if (matchingSlot) {
                        if (matchingSlot.type === 'Definite') type = 'off';
                        else if (matchingSlot.type === 'Possible') type = 'possible';
                    }

                    const cell = document.createElement('div');
                    cell.className = `hour-cell ${type}`;
                    
                    // Tooltip
                    const tooltip = document.createElement('div');
                    tooltip.className = 'hour-tooltip';
                    const slotStatusName = type === 'off' ? 'Відключення' : (type === 'possible' ? 'Можливе відключення' : 'Світло є');
                    tooltip.textContent = `${hour}:00 - ${hour+1}:00: ${slotStatusName}`;
                    cell.appendChild(tooltip);

                    bar.appendChild(cell);
                }

                row.appendChild(bar);
                container.appendChild(row);
            }
        }

        // --- Reverse Geocoding & Address Lookup on Map Click ---
        async function onMapClick(e) {
            const { lat, lng } = e.latlng;

            if (currentMarker) {
                map.removeLayer(currentMarker);
            }
            currentMarker = L.marker([lat, lng]).addTo(map);

            currentMarker.bindPopup('<div style="text-align: center; width: 150px;"><i class="fa-solid fa-spinner fa-spin"></i> Визначаємо адресу...</div>').openPopup();

            try {
                // Reverse geocode via Nominatim
                const geoUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=uk`;
                const response = await fetch(geoUrl, {
                    headers: { 'User-Agent': 'SvitloLocator-Dtek-Parser-App' }
                });
                
                if (!response.ok) throw new Error("Reverse geocoding failed");

                const geoData = await response.json();
                const address = geoData.address || {};
                
                const street = address.road || address.street || address.suburb;
                const houseNumber = address.house_number;

                if (!street) {
                    currentMarker.bindPopup('<div style="text-align: center;">Не вдалося знайти вулицю</div>').openPopup();
                    return;
                }

                const displayAddress = `${street}, ${houseNumber || ''}`.trim().replace(/,$/, '');
                const cleanQuery = cleanStreetName(street);
                
                let popupHtml = `
                    <div style="font-family: 'Inter', sans-serif; font-size: 0.85rem; padding: 2px;">
                        <div style="font-weight: 600; margin-bottom: 2px;"><i class="fa-solid fa-location-dot" style="color: var(--primary);"></i> Адреса:</div>
                        <div>${displayAddress}</div>
                        <button class="map-tip-btn" onclick="lookupAddress('${cleanQuery}', '${houseNumber || ''}')">Перевірити світло</button>
                    </div>
                `;

                currentMarker.bindPopup(popupHtml).openPopup();
            } catch (err) {
                console.error("Map click reverse geocoding failed:", err);
                currentMarker.bindPopup('<div style="text-align: center; color: var(--power-off);"><i class="fa-solid fa-circle-xmark"></i> Помилка геокодування</div>').openPopup();
            }
        }

        function cleanStreetName(street) {
            let clean = street.toLowerCase();
            const prefixes = [
                'вулиця', 'вул.', 'провулок', 'пров.', 'проспект', 'просп.', 
                'бульвар', 'бул.', 'площа', 'майдан', 'узвіз', 'шосе'
            ];
            
            prefixes.forEach(prefix => {
                clean = clean.replace(prefix, '');
            });
            
            return clean.trim();
        }

        async function lookupAddress(streetQuery, houseNumber) {
            if (currentMarker) {
                currentMarker.closePopup();
            }

            const statusPanel = document.getElementById('status-panel');
            const loader = document.getElementById('status-loader');
            statusPanel.style.display = 'block';
            loader.style.display = 'flex';

            try {
                // 1. Search street
                const streetUrl = `/api/v1/streets?regionId=${selectedRegionId}&dsoId=${selectedDsoId}&query=${encodeURIComponent(streetQuery)}`;
                const streetResponse = await fetch(streetUrl);
                const streets = await streetResponse.json();

                if (streets.length === 0) {
                    throw new Error("Street not found");
                }

                const matchedStreet = streets[0];
                selectedStreetId = matchedStreet.id;
                document.getElementById('street-input').value = matchedStreet.value;

                // 2. Fetch houses
                const houseUrl = `/api/v1/houses?regionId=${selectedRegionId}&streetId=${matchedStreet.id}&dsoId=${selectedDsoId}`;
                const houseResponse = await fetch(houseUrl);
                const houses = await houseResponse.json();

                // Find exact or closest house number match
                let matchedHouse = null;
                const cleanHouseNo = houseNumber.toLowerCase().trim();
                
                if (cleanHouseNo) {
                    matchedHouse = houses.find(h => h.value.toLowerCase().trim() === cleanHouseNo);
                    
                    if (!matchedHouse) {
                        matchedHouse = houses.find(h => h.value.toLowerCase().includes(cleanHouseNo) || cleanHouseNo.includes(h.value.toLowerCase()));
                    }
                }

                if (!matchedHouse && houses.length > 0) {
                    matchedHouse = houses[0];
                }

                if (!matchedHouse) {
                    throw new Error("House not found");
                }

                // 3. Populate house dropdown
                const houseSelect = document.getElementById('house-select');
                houseSelect.innerHTML = '';
                
                houses.sort((a, b) => a.value.localeCompare(b.value, undefined, { numeric: true, sensitivity: 'base' }));
                
                houses.forEach(house => {
                    const opt = document.createElement('option');
                    opt.value = house.id;
                    opt.textContent = house.value;
                    if (house.id === matchedHouse.id) {
                        opt.selected = true;
                    }
                    houseSelect.appendChild(opt);
                });
                
                houseSelect.disabled = false;
                
                // 4. Fetch status
                const label = `${matchedStreet.value}, ${matchedHouse.value}`;
                await fetchBlackoutStatus(matchedHouse.id, label);
            } catch (err) {
                console.error(err);
                document.getElementById('addr-val').textContent = "Адресу не знайдено";
                document.getElementById('group-val').textContent = "";
                document.getElementById('reason-val').textContent = `Не вдалося співставити адресу з базою Yasno. Вулиця: "${streetQuery}", Будинок: "${houseNumber}". Скористайтеся пошуком ліворуч.`;
                document.getElementById('status-badge').style.display = 'none';
                document.getElementById('planned-outages-section').style.display = 'none';
                document.getElementById('weekly-grid').innerHTML = '';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
