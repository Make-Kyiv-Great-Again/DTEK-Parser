<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SvitloLocator - Geolocation Coordinates Demo</title>
    <!-- Modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 25, 40, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #2563eb;
            --primary-hover: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --status-on: #10b981;
            --status-off: #ef4444;
            --status-possible: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #111827 0%, var(--bg-color) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .section-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .coords-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .coord-field span {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .coord-field strong {
            font-size: 16px;
            font-weight: 600;
            color: #60a5fa;
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-bottom: 12px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Manual coordinate inputs */
        .manual-inputs {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            color: var(--text-main);
            font-size: 13px;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 20px 0;
            position: relative;
        }

        .divider::after {
            content: "або ввести вручну";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111827;
            padding: 0 10px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Result Area */
        .result-panel {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .status-badge.on {
            background: rgba(16, 185, 129, 0.15);
            color: var(--status-on);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .status-badge.off {
            background: rgba(239, 68, 68, 0.15);
            color: var(--status-off);
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .status-badge.possible {
            background: rgba(245, 158, 11, 0.15);
            color: var(--status-possible);
            border: 1px solid rgba(245, 158, 11, 0.25);
        }

        .status-badge span.dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            display: inline-block;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
            text-align: left;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-val {
            font-weight: 500;
            text-align: right;
            max-width: 65%;
        }

        /* Loader */
        .loader {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .error-message {
            display: none;
            color: var(--status-off);
            font-size: 13px;
            margin-top: 10px;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SvitloLocator</h1>
        <p class="subtitle">Перевірка відключень за геолокацією (v1 API)</p>

        <!-- Location Controls -->
        <div class="section-box">
            <div class="coords-display">
                <div class="coord-field">
                    <span>Широта (Lat)</span>
                    <strong id="lat-val">-</strong>
                </div>
                <div class="coord-field">
                    <span>Довгота (Lon)</span>
                    <strong id="lon-val">-</strong>
                </div>
            </div>
            
            <button class="btn" id="btn-geo">Отримати геолокацію</button>
            
            <div class="divider"></div>
            
            <div class="manual-inputs">
                <input type="number" step="0.0001" id="input-lat" placeholder="Широта (напр. 50.4501)" value="50.4501">
                <input type="number" step="0.0001" id="input-lon" placeholder="Довгота (напр. 30.5234)" value="30.5234">
            </div>
            <button class="btn" style="margin-top: 10px; background: rgba(255,255,255,0.06); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); box-shadow: none;" id="btn-manual">Перевірити ці координати</button>
        </div>

        <!-- Loader -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <span>Визначаємо статус відключень...</span>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="error-box"></div>

        <!-- Result Box -->
        <div class="result-panel" id="result-panel">
            <div class="section-box" style="margin-bottom: 0;">
                <div class="status-badge" id="badge-elm">
                    <span class="dot"></span>
                    <span id="badge-text">-</span>
                </div>
                
                <div class="info-row">
                    <span class="info-label">Адреса</span>
                    <span class="info-val" id="res-addr">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Опис статусу</span>
                    <span class="info-val" id="res-reason">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Група відключень</span>
                    <span class="info-val" id="res-group">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Оновлено</span>
                    <span class="info-val" id="res-update">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btn-geo').addEventListener('click', () => {
            if (!navigator.geolocation) {
                showError("Ваш браузер не підтримує геолокацію.");
                return;
            }

            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                document.getElementById('lat-val').textContent = lat.toFixed(5);
                document.getElementById('lon-val').textContent = lon.toFixed(5);
                document.getElementById('input-lat').value = lat.toFixed(5);
                document.getElementById('input-lon').value = lon.toFixed(5);

                fetchStatus(lat, lon);
            }, error => {
                showError("Помилка отримання геолокації: " + error.message + ". Ви можете скористатися ручним вводом.");
            });
        });

        document.getElementById('btn-manual').addEventListener('click', () => {
            const lat = parseFloat(document.getElementById('input-lat').value);
            const lon = parseFloat(document.getElementById('input-lon').value);

            if (isNaN(lat) || isNaN(lon)) {
                showError("Будь ласка, введіть коректні числа широти та довготи.");
                return;
            }

            document.getElementById('lat-val').textContent = lat.toFixed(5);
            document.getElementById('lon-val').textContent = lon.toFixed(5);

            fetchStatus(lat, lon);
        });

        async function fetchStatus(lat, lon) {
            const loader = document.getElementById('loader');
            const resultPanel = document.getElementById('result-panel');
            const errorBox = document.getElementById('error-box');

            loader.style.display = 'flex';
            resultPanel.style.display = 'none';
            errorBox.style.display = 'none';

            try {
                const response = await fetch(`/api/v1/status/coordinates?lat=${lat}&lon=${lon}`);
                if (!response.ok) {
                    const errObj = await response.json();
                    throw new Error(errObj.detail || "Не вдалося отримати статус для цих координат.");
                }

                const data = await response.json();
                renderResult(data);
            } catch (err) {
                showError(err.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderResult(data) {
            const resultPanel = document.getElementById('result-panel');
            const badgeElm = document.getElementById('badge-elm');
            const badgeText = document.getElementById('badge-text');
            const resAddr = document.getElementById('res-addr');
            const resReason = document.getElementById('res-reason');
            const resGroup = document.getElementById('res-group');
            const resUpdate = document.getElementById('res-update');

            // Configure badge styles
            badgeElm.className = 'status-badge';
            if (data.power_status === 'ON') {
                badgeElm.classList.add('on');
                badgeText.textContent = 'Світло є';
            } else if (data.power_status === 'OFF') {
                badgeElm.classList.add('off');
                badgeText.textContent = 'Немає світла';
            } else {
                badgeElm.classList.add('possible');
                badgeText.textContent = 'Можливе вимкнення';
            }

            resAddr.textContent = data.address;
            resReason.textContent = data.status_reason;
            resGroup.textContent = `Група ${data.group_info.raw_group_key} (Графік ${data.group_info.mapped_group_key})`;
            resUpdate.textContent = data.last_update || "Невідомо";

            resultPanel.style.display = 'block';
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-box');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }
    </script>
</body>
</html>
